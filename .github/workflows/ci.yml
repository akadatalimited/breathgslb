name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.x'
      - run: go test -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux
            cgo: 1
          - target: macos
            cgo: 1
          - target: windows
            cgo: 1
          - target: freebsd
            cgo: 0
          - target: bsd
            cgo: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.x'
      - name: Build ${{ matrix.target }}
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: make release-${{ matrix.target }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: dist
