- name: "lightitup.zerodns.co.uk."
  ns: ["gslb.zerodns.co.uk.", "gslb2.zerodns.co.uk."]
  admin: "hostmaster.zerodns.co.uk."
  ttl_soa: 60
  ttl_answer: 20
  refresh: 60
  retry: 10
  expire: 90
  minttl: 60
  serve: "secondary"
  masters:
    - "[2a02:8012:bc57:53::1]:53"
  xfr_source: "2a02:8012:bc57:53a::1"

  dnssec:
    mode: generated
    zsk_keyfile: "/etc/breathgslb/keys/lightitup.zerodns.co.uk.zsk"
    ksk_keyfile: "/etc/breathgslb/keys/lightitup.zerodns.co.uk.ksk"
    nsec3_iterations: 0

  tsig:
    default_algorithm: "hmac-sha256"
    keys:
      - name: "lightitup-xfr."
        secret: ""

  pools:
    - name: "public-v6-primary"
      family: "ipv6"
      class: "public"
      role: "primary"
      members:
        - ip: "2a02:8012:bc57:5353::1"
    - name: "public-v4-primary"
      family: "ipv4"
      class: "public"
      role: "primary"
      members:
        - ip: "217.155.241.55"
    - name: "public-v6-secondary"
      family: "ipv6"
      class: "public"
      role: "secondary"
      members:
        - ip: "2a02:8012:bc57:5353::2"
    - name: "public-v4-secondary"
      family: "ipv4"
      class: "public"
      role: "secondary"
      members:
        - ip: "13.41.102.86"
    - name: "public-v6-fallback"
      family: "ipv6"
      class: "public"
      role: "fallback"
      members:
        - ip: "2a02:8012:bc57:5353::53"
    - name: "private-v6-primary"
      family: "ipv6"
      class: "private"
      role: "primary"
      members:
        - ip: "2a02:8012:bc57:5353::2"
      client_nets:
        - "2a02:8012:bc57:5353::/64"
    - name: "private-v4-primary"
      family: "ipv4"
      class: "private"
      role: "primary"
      members:
        - ip: "172.16.0.1"
      client_nets:
        - "172.16.0.0/24"

  hosts:
    - name: "app"
      health:
        kind: http
        host_header: "articles.akadata.ltd"
        path: "/health"
        scheme: https
        method: GET
        port: 443
        expect: "OK"
        insecure_tls: false
      pools:
        - name: "app-v6-primary"
          family: "ipv6"
          class: "public"
          role: "primary"
          members:
            - ip: "2a02:8012:bc57:5353::10"
        - name: "app-v4-primary"
          family: "ipv4"
          class: "public"
          role: "primary"
          members:
            - ip: "217.155.241.60"
        - name: "app-v6-private"
          family: "ipv6"
          class: "private"
          role: "primary"
          members:
            - ip: "2a02:8012:bc57:5353::10"
          client_nets:
            - "2a02:8012:bc57:5353::/64"
        - name: "app-v4-private"
          family: "ipv4"
          class: "private"
          role: "primary"
          members:
            - ip: "172.16.0.10"
          client_nets:
            - "172.16.0.0/24"

  geo:
    public-v6-primary:
      allow_countries: ["GB", "FR", "DE"]
      allow_continents: ["EU"]
    public-v4-primary:
      allow_countries: ["GB", "FR", "DE"]
      allow_continents: ["EU"]
    public-v6-secondary:
      allow_countries: ["US", "CA"]
      allow_continents: ["NA"]
    public-v4-secondary:
      allow_countries: ["US", "CA"]
      allow_continents: ["NA"]
    public-v6-fallback:
      allow_all: true

  lightup:
    enabled: true
    ttl: 60
    forward: true
    reverse: true
    strategy: "hash"
    forward_template: "templated-{addr}.lightitup.zerodns.co.uk."
    families:
      - family: "ipv6"
        class: "public"
        prefix: "2a02:8012:bc57:5353::/64"
        respond_aaaa: true
        respond_ptr: true
        exclude:
          - "2a02:8012:bc57:5353::1/128"
          - "2a02:8012:bc57:5353::53/128"
      - family: "ipv4"
        class: "private"
        prefix: "172.16.0.0/24"
        respond_a: true
        respond_ptr: true
        exclude:
          - "172.16.0.1/32"
          - "172.16.0.2/32"
