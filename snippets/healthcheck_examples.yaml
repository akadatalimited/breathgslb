# New Healthcheck types


health:
  kind: http
  host_header: "articles.akadata.ltd"
  path: "/health"
  scheme: https
  method: GET
  port: 443
  expect: "OK"
  insecure_tls: false

health:
  kind: http3
  expect: "OK"


health:
  kind: tcp
  port: 443
  tls_enable: true
  sni: "articles.akadata.ltd"
  alpn: "h2"

health:
  kind: udp
  port: 53
  udp_payload_b64: "cGluZw=="     # "ping"
  udp_expect_re: "."               # any response


health:
  kind: icmp
  icmp_payload_b64: "Z3NsYg=="    # "gslb"

health:
  kind: rawip
  protocol: 47
