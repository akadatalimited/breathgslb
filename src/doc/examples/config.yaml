# Modern primary example
#
# This file shows the current model:
# - explicit bind addresses
# - file-based forward and reverse zones
# - shared discovery catalog for secondaries
# - pools at the apex
# - first-class host records under hosts:
# - named-pool geo
# - lightup forward/reverse synthesis

listen_addrs:
  - "[2a02:8012:bc57:53::1]:53"

zones_dir: "/etc/breathgslb/zones"
reverse_dir: "/etc/breathgslb/reverse"

timeout_sec: 5
interval_sec: 8
rise: 2
fall: 4
jitter_ms: 200
cooldown_sec: 25
edns_buf: 1232
log_queries: true
log_file: "/var/log/breathgslb/breathgslb.log"

tsig:
  path: "/etc/breathgslb/tsig"

geoip:
  enabled: true
  database: "/etc/breathgslb/geoip/GeoLite2-Country.mmdb"
  prefer_field: "registered"
  cache_ttl_sec: 600

discovery:
  catalog_zone: "_catalog.breathgslb."
  ttl: 60
  tsig:
    default_algorithm: "hmac-sha256"
    keys:
      - name: "cluster-xfr."
        secret: ""
        allow_xfr_from:
          - "::1"
          - "2a02:8012:bc57::/48"

zones:
  - name: "lightitup.zerodns.co.uk."
    serve: "primary"
    ns: ["gslb.zerodns.co.uk.", "gslb2.zerodns.co.uk."]
    admin: "hostmaster.zerodns.co.uk."
    ttl_soa: 60
    ttl_answer: 20
    refresh: 60
    retry: 10
    expire: 90
    minttl: 60

    dnssec:
      mode: generated
      zsk_keyfile: "/etc/breathgslb/keys/lightitup.zerodns.co.uk.zsk"
      ksk_keyfile: "/etc/breathgslb/keys/lightitup.zerodns.co.uk.ksk"
      nsec3_iterations: 0

    tsig:
      default_algorithm: "hmac-sha256"
      keys:
        - name: "lightitup-xfr."
          secret: ""
          allow_xfr_from:
            - "::1"
            - "2a02:8012:bc57::/48"

    pools:
      - name: "public-v6-primary"
        family: "ipv6"
        class: "public"
        role: "primary"
        members:
          - ip: "2a02:8012:bc57:5353::1"
      - name: "public-v4-primary"
        family: "ipv4"
        class: "public"
        role: "primary"
        members:
          - ip: "217.155.241.55"
      - name: "public-v6-secondary"
        family: "ipv6"
        class: "public"
        role: "secondary"
        members:
          - ip: "2a02:8012:bc57:5353::2"
      - name: "public-v4-secondary"
        family: "ipv4"
        class: "public"
        role: "secondary"
        members:
          - ip: "13.41.102.86"
      - name: "public-v6-fallback"
        family: "ipv6"
        class: "public"
        role: "fallback"
        members:
          - ip: "2a02:8012:bc57:5353::53"
      - name: "private-v6-primary"
        family: "ipv6"
        class: "private"
        role: "primary"
        members:
          - ip: "2a02:8012:bc57:5353::2"
        client_nets:
          - "2a02:8012:bc57:5353::/64"
      - name: "private-v4-primary"
        family: "ipv4"
        class: "private"
        role: "primary"
        members:
          - ip: "172.16.0.1"
        client_nets:
          - "172.16.0.0/24"

    hosts:
      - name: "app"
        health:
          kind: http
          host_header: "app.lightitup.zerodns.co.uk"
          path: "/health"
          scheme: https
          method: GET
          port: 443
          expect: "OK"
        pools:
          - name: "app-v6-primary"
            family: "ipv6"
            class: "public"
            role: "primary"
            members:
              - ip: "2a02:8012:bc57:5353::10"
          - name: "app-v4-primary"
            family: "ipv4"
            class: "public"
            role: "primary"
            members:
              - ip: "217.155.241.60"
          - name: "app-v6-private"
            family: "ipv6"
            class: "private"
            role: "primary"
            members:
              - ip: "2a02:8012:bc57:5353::10"
            client_nets:
              - "2a02:8012:bc57:5353::/64"
          - name: "app-v4-private"
            family: "ipv4"
            class: "private"
            role: "primary"
            members:
              - ip: "172.16.0.10"
            client_nets:
              - "172.16.0.0/24"

    geo:
      public-v6-primary:
        allow_countries: ["GB", "FR", "DE"]
        allow_continents: ["EU"]
      public-v4-primary:
        allow_countries: ["GB", "FR", "DE"]
        allow_continents: ["EU"]
      public-v6-secondary:
        allow_countries: ["US", "CA"]
        allow_continents: ["NA"]
      public-v4-secondary:
        allow_countries: ["US", "CA"]
        allow_continents: ["NA"]
      public-v6-fallback:
        allow_all: true

    lightup:
      enabled: true
      ttl: 60
      forward: true
      reverse: true
      strategy: "hash"
      forward_template: "templated-{addr}.lightitup.zerodns.co.uk."
      families:
        - family: "ipv6"
          class: "public"
          prefix: "2a02:8012:bc57:5353::/64"
          respond_aaaa: true
          respond_ptr: true
          exclude:
            - "2a02:8012:bc57:5353::1/128"
            - "2a02:8012:bc57:5353::53/128"
        - family: "ipv4"
          class: "private"
          prefix: "172.16.0.0/24"
          respond_a: true
          respond_ptr: true
          exclude:
            - "172.16.0.1/32"
            - "172.16.0.2/32"

    alias_host:
      www: "articles.akadata.ltd."

    txt:
      - text:
          - "BreathGSLB primary example"
        ttl: 300
    mx:
      - preference: 10
        exchange: "mail.zerodns.co.uk."
        ttl: 300
    caa:
      - flag: 0
        tag: "issue"
        value: "letsencrypt.org"
        ttl: 900
    srv:
      - name: "_https._tcp.app.lightitup.zerodns.co.uk."
        priority: 10
        weight: 60
        port: 443
        target: "app.lightitup.zerodns.co.uk."
        ttl: 60
    naptr:
      - name: "lightitup.zerodns.co.uk."
        order: 100
        preference: 10
        flags: "S"
        services: "SIPS+D2T"
        regexp: ""
        replacement: "_https._tcp.app.lightitup.zerodns.co.uk."
        ttl: 60

    health:
      kind: http
      host_header: "lightitup.zerodns.co.uk"
      path: "/health"
      scheme: https
      method: GET
      port: 443
      expect: "OK"
