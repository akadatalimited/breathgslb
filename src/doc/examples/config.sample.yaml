# BreathGSLB sample configuration set
#
# This file shows both primary and secondary patterns.
# The primary serves local zone files and publishes the discovery catalog.
# The secondary starts from only its main config and discovers zones from the
# primary using the shared discovery TSIG.

listen_addrs:
  - "[2001:db8:53::1]:53"

zones_dir: "/etc/breathgslb/zones"
reverse_dir: "/etc/breathgslb/reverse"

timeout_sec: 5
interval_sec: 8
rise: 2
fall: 4
jitter_ms: 250
cooldown_sec: 25
dns64_prefix: "64:ff9b::"
edns_buf: 1232
max_records: 8
log_queries: true
log_file: "/var/log/breathgslb/breathgslb.log"

tsig:
  path: "/etc/breathgslb/tsig"

geoip:
  enabled: true
  database: "/etc/breathgslb/geoip/GeoLite2-Country.mmdb"
  prefer_field: "registered"
  cache_ttl_sec: 600

discovery:
  catalog_zone: "_catalog.breathgslb."
  ttl: 60
  tsig:
    default_algorithm: "hmac-sha256"
    seed_env: "BREATH_TSIG_SEED"
    epoch: 1
    keys:
      - name: "cluster-xfr."
        secret: ""
        allow_xfr_from:
          - "::1"
          - "2001:db8::/32"
          - "192.0.2.0/24"

zones:
  - name: "example.net."
    serve: "primary"
    ns: ["ns1.example.net.", "ns2.example.net."]
    admin: "hostmaster.example.net."
    ttl_soa: 300
    ttl_answer: 60
    refresh: 300
    retry: 60
    expire: 3600
    minttl: 60

    dnssec:
      mode: generated
      zsk_keyfile: "/etc/breathgslb/keys/example.net.zsk"
      ksk_keyfile: "/etc/breathgslb/keys/example.net.ksk"
      nsec3_iterations: 0

    tsig:
      default_algorithm: "hmac-sha256"
      keys:
        - name: "example-xfr."
          secret: ""
          allow_xfr_from:
            - "2001:db8:53a::1"
            - "2001:db8::/32"

    pools:
      - name: "eu-v6"
        family: "ipv6"
        class: "public"
        role: "primary"
        members:
          - ip: "2001:db8:5353::10"
      - name: "eu-v4"
        family: "ipv4"
        class: "public"
        role: "primary"
        members:
          - ip: "198.51.100.10"
      - name: "na-v6"
        family: "ipv6"
        class: "public"
        role: "secondary"
        members:
          - ip: "2001:db8:5353::20"
      - name: "na-v4"
        family: "ipv4"
        class: "public"
        role: "secondary"
        members:
          - ip: "198.51.100.20"
      - name: "fallback-v6"
        family: "ipv6"
        class: "public"
        role: "fallback"
        members:
          - ip: "2001:db8:5353::53"
      - name: "private-v6"
        family: "ipv6"
        class: "private"
        role: "primary"
        members:
          - ip: "fd00:5353::10"
        client_nets:
          - "fd00:5353::/64"
      - name: "private-v4"
        family: "ipv4"
        class: "private"
        role: "primary"
        members:
          - ip: "172.16.0.10"
        client_nets:
          - "172.16.0.0/24"

    hosts:
      - name: "app"
        health:
          kind: http
          host_header: "app.example.net"
          path: "/health"
          scheme: https
          method: GET
          port: 443
          expect: "OK"
        pools:
          - name: "app-eu-v6"
            family: "ipv6"
            class: "public"
            role: "primary"
            members:
              - ip: "2001:db8:5353::100"
          - name: "app-na-v6"
            family: "ipv6"
            class: "public"
            role: "secondary"
            members:
              - ip: "2001:db8:5353::200"
        geo:
          app-eu-v6:
            allow_countries: ["GB", "FR", "DE"]
            allow_continents: ["EU"]
          app-na-v6:
            allow_countries: ["US", "CA"]
            allow_continents: ["NA"]

    geo:
      eu-v6:
        allow_countries: ["GB", "FR", "DE"]
        allow_continents: ["EU"]
      eu-v4:
        allow_countries: ["GB", "FR", "DE"]
        allow_continents: ["EU"]
      na-v6:
        allow_countries: ["US", "CA"]
        allow_continents: ["NA"]
      na-v4:
        allow_countries: ["US", "CA"]
        allow_continents: ["NA"]
      fallback-v6:
        allow_all: true

    lightup:
      enabled: true
      ttl: 60
      forward: true
      reverse: true
      strategy: "hash"
      forward_template: "templated-{addr}.example.net."
      families:
        - family: "ipv6"
          class: "public"
          prefix: "2001:db8:5353::/64"
          respond_aaaa: true
          respond_ptr: true
          exclude:
            - "2001:db8:5353::10/128"
            - "2001:db8:5353::53/128"
        - family: "ipv4"
          class: "private"
          prefix: "172.16.0.0/24"
          respond_a: true
          respond_ptr: true
          exclude:
            - "172.16.0.1/32"
            - "172.16.0.2/32"

    alias: "status.example.net."
    alias_host:
      www: "status.example.net."

    txt:
      - text: ["BreathGSLB sample zone"]
        ttl: 300
    mx:
      - preference: 10
        exchange: "mail.example.net."
        ttl: 300
    caa:
      - flag: 0
        tag: "issue"
        value: "letsencrypt.org"
        ttl: 900
    rp:
      mbox: "hostmaster.example.net."
      txt: "contact.example.net."
      ttl: 900
    sshfp:
      - name: "ssh.example.net."
        algorithm: 4
        type: 2
        fingerprint: "0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF"
        ttl: 300
    srv:
      - name: "_https._tcp.app.example.net."
        priority: 10
        weight: 60
        port: 443
        target: "app.example.net."
        ttl: 60
    naptr:
      - name: "example.net."
        order: 100
        preference: 10
        flags: "S"
        services: "SIPS+D2T"
        regexp: ""
        replacement: "_https._tcp.app.example.net."
        ttl: 60

    health:
      kind: http
      host_header: "example.net"
      path: "/health"
      scheme: https
      method: GET
      port: 443
      expect: "OK"

